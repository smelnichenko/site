# CI: Run tests on push to non-main branches or PRs

when:
  - event: push
    branch:
      exclude: main
  - event: pull_request

clone:
  - name: git
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 100

steps:
  - name: test
    image: eclipse-temurin:25-jdk
    commands:
      - npm ci --silent
      - npx tsc --noEmit
      - npm run test:coverage
    backend_options:
      kubernetes:
        resources:
          requests: { cpu: 250m, memory: 1Gi }
          limits: { cpu: 2000m, memory: 2Gi }
        secrets:
          - name: woodpecker-ci-secrets
            key: nexus_npm_registry
            target:
              env: NPM_CONFIG_REGISTRY

  - name: sonar
    image: eclipse-temurin:25-jdk
    depends_on: [test]
    commands:
      - '[ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ] || { echo "Skipping SonarQube (no token or URL)"; exit 0; }'
      - |
        for i in $(seq 1 30); do
          wget -q --spider --timeout=2 "$SONAR_HOST_URL/api/system/status" 2>/dev/null && break
          sleep 1
        done
      - npx sonarqube-scanner -Dsonar.scanner.skipJreProvisioning=true
    backend_options:
      kubernetes:
        secrets:
          - name: woodpecker-ci-secrets
            key: sonar_token
            target:
              env: SONAR_TOKEN
          - name: woodpecker-ci-secrets
            key: sonar_host_url
            target:
              env: SONAR_HOST_URL
          - name: woodpecker-ci-secrets
            key: nexus_npm_registry
            target:
              env: NPM_CONFIG_REGISTRY
