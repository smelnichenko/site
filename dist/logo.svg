<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Monitor screen frame -->
  <rect x="4" y="8" width="56" height="40" rx="6" ry="6" stroke="#0066cc" stroke-width="3" fill="none"/>
  <!-- Stand -->
  <line x1="32" y1="48" x2="32" y2="56" stroke="#0066cc" stroke-width="3" stroke-linecap="round"/>
  <line x1="22" y1="56" x2="42" y2="56" stroke="#0066cc" stroke-width="3" stroke-linecap="round"/>
  <!-- Pulse/heartbeat line -->
  <polyline
    points="10,28 20,28 24,28 27,38 31,14 35,36 38,24 42,28 54,28"
    stroke="#0066cc"
